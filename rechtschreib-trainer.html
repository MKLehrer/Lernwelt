<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rechtschreib-Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --text: #1e1e2e;
  --muted: #8888aa;
  --shadow: 0 6px 24px rgba(80,80,180,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); overflow-x: hidden; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ── MENU ── */
#menu-screen { background: linear-gradient(160deg, #667eea 0%, #a78bfa 60%, #f472b6 100%); padding: 0; }
.menu-top { width: 100%; padding: 48px 24px 32px; text-align: center; }
.menu-top h1 { font-family: 'Baloo 2', cursive; font-size: clamp(2rem, 7vw, 3.2rem); color: white; text-shadow: 0 3px 12px rgba(0,0,0,.2); }
.menu-top p { color: rgba(255,255,255,.85); font-size: 1.05rem; font-weight: 700; margin-top: 8px; }
.menu-wave { width: 100%; flex: 1; background: var(--bg); border-radius: 36px 36px 0 0; padding: 32px 20px 60px; }
.menu-wave h2 { font-family: 'Baloo 2', cursive; font-size: 1.1rem; color: var(--muted); text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px; }
.topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; max-width: 700px; margin: 0 auto 28px; }
.topic-btn { background: white; border: 2.5px solid transparent; border-radius: 20px; padding: 18px 12px 14px; cursor: pointer; text-align: center; transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .2s; box-shadow: 0 3px 12px rgba(0,0,0,.07); position: relative; overflow: hidden; }
.topic-btn::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--c, #667eea); border-radius: 18px 18px 0 0; }
.topic-btn:hover { transform: translateY(-5px) scale(1.03); box-shadow: 0 10px 28px rgba(100,100,220,.18); border-color: var(--c, #667eea); }
.topic-btn .t-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
.topic-btn .t-name { font-weight: 800; font-size: .92rem; line-height: 1.3; color: var(--text); }
.topic-btn .t-count { font-size: .73rem; color: var(--muted); font-weight: 700; margin-top: 3px; }
.start-all-btn { display: block; width: 100%; max-width: 360px; margin: 0 auto; padding: 18px; background: linear-gradient(135deg, #667eea, #a78bfa); color: white; border: none; border-radius: 50px; font-family: 'Baloo 2', cursive; font-size: 1.3rem; cursor: pointer; box-shadow: 0 6px 0 rgba(80,40,180,.35); transition: transform .15s, box-shadow .15s; }
.start-all-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 rgba(80,40,180,.35); }

/* ── GAME ── */
#game-screen { justify-content: flex-start; padding: 0; }
.topbar { width: 100%; background: white; padding: 14px 18px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); position: sticky; top: 0; z-index: 20; }
.back-btn { background: #f0f0fa; border: none; border-radius: 50px; padding: 8px 16px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .88rem; cursor: pointer; color: #555; white-space: nowrap; transition: background .15s; }
.back-btn:hover { background: #e0e0f5; }
.topbar-mid { flex: 1; min-width: 0; }
.topbar-title { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-sub { font-size: .74rem; color: var(--muted); font-weight: 700; }
.score-pill { background: linear-gradient(135deg, #667eea, #a78bfa); color: white; border-radius: 50px; padding: 6px 14px; font-weight: 800; font-size: .95rem; white-space: nowrap; }
.prog-bar { width: 100%; height: 8px; background: #eee; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #667eea, #f472b6); transition: width .4s ease; border-radius: 0 4px 4px 0; }
.game-body { width: 100%; max-width: 620px; padding: 28px 20px 60px; display: flex; flex-direction: column; align-items: center; gap: 20px; }

.repeat-badge { background: linear-gradient(135deg, #f472b6, #fb923c); color: white; border-radius: 50px; padding: 7px 20px; font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800; animation: badgePop .4s cubic-bezier(.34,1.56,.64,1); display: flex; align-items: center; gap: 8px; }
@keyframes badgePop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

/* Question card */
.q-card { background: white; border-radius: 28px; padding: 28px 24px; width: 100%; box-shadow: var(--shadow); text-align: center; }
.q-topic-pill { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: .73rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; }

/* Focus highlight – the tricky part of the word */
.focus-label { font-size: .8rem; font-weight: 800; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
.q-sentence { font-size: clamp(1rem, 3.5vw, 1.2rem); font-weight: 700; color: #333; line-height: 1.7; }
.q-sentence .blank { display: inline-block; border-bottom: 3px solid #667eea; min-width: 80px; color: #667eea; font-weight: 800; padding: 0 4px; }

/* Options */
.opts { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; }
.opt-btn {
  flex: 1; min-width: 110px; max-width: 220px;
  padding: 16px 12px;
  background: white; border: 2.5px solid #dde; border-radius: 20px;
  font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), border-color .15s, background .15s;
  box-shadow: 0 3px 10px rgba(0,0,0,.06);
  line-height: 1.4;
}
/* Tricky letters – no highlight (would give away the answer) */
.opt-btn .hi { }
.opt-btn:hover:not(:disabled) { transform: translateY(-4px) scale(1.04); border-color: #667eea; background: #f5f3ff; }
.opt-btn:disabled { cursor: default; }
.opt-btn.correct { background: #e8faf0; border-color: #22c55e; animation: correctPop .45s cubic-bezier(.34,1.56,.64,1); }
.opt-btn.wrong { background: #fff0f0; border-color: #f87171; animation: wrongShake .38s ease; }
.opt-btn.reveal { background: #e8faf0; border-color: #22c55e; }
@keyframes correctPop { 0%{transform:scale(1)} 55%{transform:scale(1.1)} 100%{transform:scale(1)} }
@keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

/* Feedback */
.feedback-area { min-height: 80px; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
.fb-msg { font-family: 'Baloo 2', cursive; font-size: 1.25rem; padding: 10px 24px; border-radius: 16px; animation: popIn .3s ease; text-align: center; }
.fb-msg.good { background: #dcfce7; color: #166534; }
.fb-msg.bad  { background: #fee2e2; color: #991b1b; }
@keyframes popIn { from{transform:scale(.5);opacity:0} 80%{transform:scale(1.05)} to{transform:scale(1);opacity:1} }
.next-btn { background: linear-gradient(135deg, #667eea, #a78bfa); color: white; border: none; border-radius: 50px; padding: 13px 38px; font-family: 'Baloo 2', cursive; font-size: 1.15rem; cursor: pointer; box-shadow: 0 5px 0 rgba(80,30,180,.3); transition: transform .15s, box-shadow .15s; animation: popIn .3s ease; }
.next-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 rgba(80,30,180,.3); }

/* ── RESULT ── */
#result-screen { background: linear-gradient(160deg, #667eea 0%, #a78bfa 60%, #f472b6 100%); justify-content: center; padding: 40px 20px; gap: 20px; }
.result-card { background: white; border-radius: 32px; padding: 40px 32px; max-width: 460px; width: 100%; text-align: center; box-shadow: 0 16px 40px rgba(0,0,0,.15); }
.result-emoji { font-size: 4.5rem; display: block; animation: bounce 1s ease infinite; margin-bottom: 4px; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
.result-title { font-family: 'Baloo 2', cursive; font-size: 2.2rem; margin-bottom: 6px; }
.result-score { font-family: 'Baloo 2', cursive; font-size: 3.8rem; font-weight: 800; background: linear-gradient(135deg,#667eea,#f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
.result-stars { font-size: 2.2rem; letter-spacing: 8px; margin: 10px 0; }
.result-sub { color: var(--muted); font-weight: 700; font-size: .95rem; }
.wrong-summary { background: #fff7ed; border-radius: 20px; padding: 18px 20px; max-width: 460px; width: 100%; }
.wrong-summary h3 { font-family: 'Baloo 2', cursive; font-size: 1.1rem; color: #92400e; margin-bottom: 12px; }
.wrong-list { display: flex; flex-wrap: wrap; gap: 8px; }
.wrong-chip { background: white; border: 2px solid #fbbf24; border-radius: 12px; padding: 6px 14px; font-weight: 800; font-size: .95rem; color: #78350f; }
.result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.btn-main { background: white; color: #667eea; border: none; border-radius: 50px; padding: 14px 28px; font-family: 'Baloo 2', cursive; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,.12); transition: transform .15s; }
.btn-main:hover { transform: translateY(-3px); }
.btn-ghost { background: rgba(255,255,255,.25); color: white; border: 2px solid rgba(255,255,255,.6); border-radius: 50px; padding: 14px 28px; font-family: 'Baloo 2', cursive; font-size: 1.1rem; cursor: pointer; }
.btn-ghost:hover { background: rgba(255,255,255,.38); }
.cp { position:fixed; width:10px; height:13px; border-radius:2px; animation: cf 3s ease-in forwards; z-index:9999; pointer-events:none; }
@keyframes cf { 0%{transform:translateY(-10px) rotateZ(0);opacity:1} 100%{transform:translateY(110vh) rotateZ(720deg);opacity:0} }
@media(max-width:480px) { .topic-grid { grid-template-columns: repeat(3,1fr); } .opt-btn { font-size:1rem; padding:13px 8px; } }
</style>
</head>
<body>

<!-- MENU -->
<div class="screen active" id="menu-screen">
  <div class="menu-top">
    <h1>✏️ Rechtschreib-<br>Trainer</h1>
    <p>Wähle ein Thema oder übe alles!</p>
  </div>
  <div class="menu-wave">
    <h2>📚 Themen wählen</h2>
    <div class="topic-grid" id="topic-grid"></div>
    <button class="start-all-btn" onclick="startGame('all')">🚀 Alle Themen üben</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div class="topbar">
    <button class="back-btn" onclick="goMenu()">← Menü</button>
    <div class="topbar-mid">
      <div class="topbar-title" id="tb-title">Thema</div>
      <div class="topbar-sub" id="tb-sub">Frage 1 / 10</div>
    </div>
    <div class="score-pill">⭐ <span id="tb-score">0</span></div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="game-body">
    <div id="repeat-slot"></div>
    <div class="q-card">
      <div class="q-topic-pill" id="q-pill"></div>
      <div class="focus-label" id="focus-label"></div>
      <div class="q-sentence" id="q-sentence"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="feedback-area" id="feedback-area"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result-screen">
  <div class="result-card">
    <span class="result-emoji" id="r-emoji">🏆</span>
    <div class="result-title" id="r-title">Super!</div>
    <div class="result-score" id="r-score">8/10</div>
    <div class="result-stars" id="r-stars">⭐⭐⭐</div>
    <div class="result-sub" id="r-sub"></div>
  </div>
  <div class="wrong-summary" id="wrong-summary" style="display:none">
    <h3>🔁 Diese Wörter nochmal üben:</h3>
    <div class="wrong-list" id="wrong-list"></div>
  </div>
  <div class="result-btns">
    <button class="btn-main" id="r-retry-wrong" onclick="retryWrong()">🔁 Falsche wiederholen</button>
    <button class="btn-main" onclick="retryAll()">🔄 Nochmal</button>
    <button class="btn-ghost" onclick="goMenu()">🏠 Menü</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// HILFSFUNKTION: hebt den Fokus-Teil im Wort hervor
// z.B. hi("Pferd", "Pf") → "<span class='hi'>Pf</span>erd"
// ══════════════════════════════════════════════════════════════
function hi(word, part) {
  if (!part) return word;
  // case-insensitive replace first occurrence
  const idx = word.toLowerCase().indexOf(part.toLowerCase());
  if (idx === -1) return word;
  return word.slice(0, idx) +
    `<span class='hi'>${word.slice(idx, idx + part.length)}</span>` +
    word.slice(idx + part.length);
}

// ══════════════════════════════════════════════════════════════
// WÖRTER-DATEN

      { w:"Pfütze",   opts:["Pfütze","Fütze","Phütze"],        s:"Das Kind springt in die ___.",        focus:"Pf" },
      { w:"Topf",     opts:["Topf","Topff","Tof"],              s:"Im ___ kocht die Suppe.",             focus:"pf" },
      { w:"Pfirsich", opts:["Pfirsich","Firsich","Phirsich"],  s:"Der ___ ist saftig süß.",             focus:"Pf" },
      { w:"Zopf",     opts:["Zopf","Zof","Zopff"],             s:"Sie trägt einen langen ___.",         focus:"pf" },
      { w:"Pfote",    opts:["Pfote","Fote","Pfothe"],          s:"Die Katze gibt mir die ___.",          focus:"Pf" },
      // FALLEN: beginnen mit F, nicht PF
      { w:"Fenster",  opts:["Fenster","Pfenster","Ffenster"],  s:"Ich öffne das ___.",                  focus:"F", trap:true },
      { w:"Fisch",    opts:["Fisch","Pfisch","Ffisch"],        s:"Der ___ schwimmt im Teich.",          focus:"F", trap:true },
      { w:"Feuer",    opts:["Feuer","Pfeuer","Ffeur"],         s:"Das ___ wärmt uns.",                  focus:"F", trap:true },
      { w:"Finger",   opts:["Finger","Pfinger","Ffinger"],     s:"Ich habe fünf ___.",                  focus:"F", trap:true },
      { w:"Feder",    opts:["Feder","Pfeder","Ffeder"],        s:"Die ___ schreibt fein.",              focus:"F", trap:true },
    ]
  },

  // ── SP ──────────────────────────────────────────────────────
  // FALLE: Wörter mit SCH (nicht SP am Anfang)
  {
    id:"sp", name:"Wörter mit SP", icon:"🌟", color:"#eab308", cLight:"#fefce8", cText:"#854d0e",
    focus:"sp", focusLabel:"Schreibt man es mit SP oder SCH + P?",
    words:[
      { w:"sparen",    opts:["sparen","schparen","spahren"],    s:"Ich ___ mein Taschengeld.",           focus:"sp" },
      { w:"Spiel",     opts:["Spiel","Schpiel","Spiehel"],      s:"Das ___ macht Spaß.",                 focus:"Sp" },
      { w:"Sport",     opts:["Sport","Schport","Sbort"],        s:"___ hält uns gesund.",                focus:"Sp" },
      { w:"Spinne",    opts:["Spinne","Schpinne","Sbinne"],     s:"Die ___ spinnt ein Netz.",            focus:"Sp" },

      { w:"Spur",      opts:["Spur","Schpur","Sbur"],           s:"Der Fuchs hinterlässt eine ___.",     focus:"Sp" },
      { w:"spüren",    opts:["spüren","schpüren","sbüren"],     s:"Ich ___ die Kälte.",                  focus:"sp" },
      { w:"sparsam",   opts:["sparsam","schparsam","sbarsam"],  s:"Er ist sehr ___.",                    focus:"sp" },
      // FALLEN: wirklich mit SCH (nicht SP)
      { w:"Schule",    opts:["Schule","Spule","Szchule"],       s:"Ich gehe jeden Tag in die ___.",      focus:"Sch", trap:true },
      { w:"Schere",    opts:["Schere","Spere","Szhere"],        s:"Ich schneide mit der ___.",           focus:"Sch", trap:true },
      { w:"Schrank",   opts:["Schrank","Sprank","Szhrank"],     s:"Die Kleider hängen im ___.",          focus:"Sch", trap:true },

      { w:"Schlüssel", opts:["Schlüssel","Splüssel","Szhlüssel"],s:"Ich suche meinen ___.",             focus:"Schl", trap:true },

    id:"st", name:"Wörter mit ST", icon:"⭐", color:"#84cc16", cLight:"#f7fee7", cText:"#365314",
    focus:"st", focusLabel:"Schreibt man es mit ST oder SCHT?",

      { w:"stark",     opts:["stark","schtark","sdark"],       s:"Der Löwe ist sehr ___.",               focus:"st" },

      { w:"Stuhl",     opts:["Stuhl","Schtuhl","Sduhl"],       s:"Ich sitze auf dem ___.",               focus:"St" },
      { w:"strahlen",  opts:["strahlen","schtralen","sdralen"],s:"Die Sonne ___ warm.",                  focus:"str" },
      // FALLEN: wirklich mit SCH geschrieben
      { w:"Schatz",    opts:["Schatz","Statz","Szchatz"],      s:"Du bist mein ___!",                   focus:"Sch", trap:true },

  // ── IE ──────────────────────────────────────────────────────
  // FALLE: Wörter mit kurzem I (kein ie)
  {
    id:"ie", name:"Wörter mit ie", icon:"👁️", color:"#06b6d4", cLight:"#ecfeff", cText:"#155e75",
    focus:"ie", focusLabel:"Schreibt man es mit IE oder nur I?",
    words:[
      { w:"Biene",     opts:["Biene","Bine","Bihne"],           s:"Die ___ sammelt Honig.",             focus:"ie" },

      { w:"Wiese",     opts:["Wiese","Wise","Wihse"],            s:"Auf der ___ blühen Blumen.",         focus:"ie" },

      { w:"Tier",      opts:["Tier","Tir","Tihr"],               s:"Das ___ im Zoo schläft.",            focus:"ie" },
      { w:"Beispiel",  opts:["Beispiel","Beisbil","Beisbiel"],   s:"Das ist ein gutes ___.",             focus:"ie" },
      { w:"Zwiebel",   opts:["Zwiebel","Zwibel","Zwihbel"],      s:"Die ___ macht uns weinen.",          focus:"ie" },
      // FALLEN: kurzes I, kein ie
      { w:"Mitte",     opts:["Mitte","Miette","Miiete"],         s:"Ich sitze in der ___ der Klasse.",   focus:"i", trap:true },

// STATE
// ══════════════════════════════════════════════════════════════
let queue = [], repeatQueue = [], qIdx = 0, score = 0;
let isRepeat = false, currentTopicId = null;
let totalFirst = 0, allWrongWords = [];

// ══════════════════════════════════════════════════════════════
// MENU
// ══════════════════════════════════════════════════════════════
function buildMenu() {
  const grid = document.getElementById('topic-grid');
  TOPICS.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'topic-btn';
    btn.style.setProperty('--c', t.color);
    btn.innerHTML = `<span class="t-icon">${t.icon}</span>
      <div class="t-name">${t.name}</div>
      <div class="t-count">${t.words.length} Wörter</div>`;
    btn.onclick = () => startGame(t.id);
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════════════
// GAME
// ══════════════════════════════════════════════════════════════
function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function startGame(topicId) {
  currentTopicId = topicId;
  isRepeat = false; repeatQueue = []; allWrongWords = []; score = 0;
  if (topicId === 'all') {
    queue = shuffle(TOPICS.flatMap(t => t.words.map(w => ({ ...w, topicId: t.id }))));
  } else {
    queue = shuffle(TOPICS.find(t => t.id === topicId).words.map(w => ({ ...w, topicId: topicId })));
  }
  totalFirst = queue.length; qIdx = 0;
  showScreen('game-screen'); renderQ();
}

function startRepeatRound() {
  isRepeat = true;
  queue = shuffle([...repeatQueue]); repeatQueue = []; qIdx = 0;
  renderQ();
}

function renderQ() {
  const q = queue[qIdx];
  const topic = TOPICS.find(t => t.id === q.topicId);
  const total = queue.length;

  document.getElementById('tb-title').textContent = isRepeat ? '🔁 Wiederholung' : topic.name;
  document.getElementById('tb-sub').textContent = `Frage ${qIdx+1} / ${total}`;
  document.getElementById('tb-score').textContent = score;
  document.getElementById('prog-fill').style.width = (qIdx / total * 100) + '%';

  document.getElementById('repeat-slot').innerHTML = isRepeat
    ? `<div class="repeat-badge">🔁 Nochmal – diese gingen schief!</div>` : '';

  // Pill
  const pill = document.getElementById('q-pill');
  pill.textContent = topic.name;
  pill.style.cssText = `background:${topic.cLight};color:${topic.cText}`;

  // Focus label – bei Fallen-Wörtern speziellen Hinweis zeigen
  const focusEl = document.getElementById('focus-label');
  if (q.trap) {
    focusEl.innerHTML = '🪤 Achtung – schau genau hin!';
    focusEl.style.cssText = 'color:#b45309;background:#fef3c7;border-radius:8px;padding:4px 10px;display:inline-block';
  } else {
    focusEl.textContent = topic.focusLabel;
    focusEl.style.cssText = '';
  }

  // Sentence
  document.getElementById('q-sentence').innerHTML =
    q.s.replace('___', `<span class="blank">?</span>`);

  // Options – highlight focus letters
  const opts = shuffle(q.opts.slice(0, 3));
  const grid = document.getElementById('opts');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    // highlight the focus part
    btn.innerHTML = hi(opt, q.focus || topic.focus);
    btn.onclick = () => pick(btn, opt, q.w, q, opts);
    grid.appendChild(btn);
  });

  document.getElementById('feedback-area').innerHTML = '';
}

const GOODS = ['Super! 🎉','Richtig! ⭐','Genau! 🌈','Klasse! 💪','Toll! 🏆','Wunderbar! 🌟'];
const BADS  = ['Nicht ganz... 💭','Fast! Schau genau hin 🔍','Ups! 🤔','Noch nicht ganz 💡'];

function pick(btn, chosen, correct, q, opts) {
  if (document.querySelectorAll('.opt-btn')[0].disabled) return;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  const ok = chosen === correct;
  if (ok) {
    btn.classList.add('correct'); score++;
    document.getElementById('tb-score').textContent = score;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent.replace(/\s/g,'') === correct.replace(/\s/g,'')) b.classList.add('reveal');
    });
    if (!repeatQueue.find(r => r.w === q.w)) repeatQueue.push({ ...q });
    if (!allWrongWords.includes(q.w)) allWrongWords.push(q.w);
  }

  // Show correct answer in sentence
  const col = ok ? '#16a34a' : '#dc2626';
  document.getElementById('q-sentence').innerHTML =
    q.s.replace('___', `<span class="blank" style="color:${col};border-color:${col}">${correct}</span>`);

  const isLast = qIdx + 1 >= queue.length;
  const nextLabel = isLast
    ? (repeatQueue.length > 0 ? '🔁 Falsche wiederholen!' : '🏁 Ergebnis')
    : 'Weiter →';

  document.getElementById('feedback-area').innerHTML =
    `<div class="fb-msg ${ok?'good':'bad'}">${ok ? GOODS[~~(Math.random()*GOODS.length)] : BADS[~~(Math.random()*BADS.length)]}</div>
     <button class="next-btn" onclick="advance()">${nextLabel}</button>`;
}

function advance() {
  qIdx++;
  if (qIdx >= queue.length) {
    if (repeatQueue.length > 0) startRepeatRound();
    else showResult();
  } else renderQ();
}

// ══════════════════════════════════════════════════════════════
// RESULT
// ══════════════════════════════════════════════════════════════
function showResult() {
  showScreen('result-screen');
  const correct = totalFirst - allWrongWords.length;
  const pct = correct / totalFirst;
  const [emoji,title,sub] = pct===1
    ? ['🏆','Perfekt!','Alle Wörter richtig – du bist ein Rechtschreib-Profi!']
    : pct>=.8 ? ['🌟','Super gemacht!','Fast alles richtig – weiter so!']
    : pct>=.6 ? ['😊','Gut gemacht!','Übe die schwierigen Wörter nochmal!']
    : pct>=.4 ? ['💪','Weiter üben!','Noch nicht ganz – du schaffst das!']
    : ['📚','Nicht aufgeben!','Lies die Wörter nochmal und probier es erneut!'];

  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-score').textContent = `${correct}/${totalFirst}`;
  document.getElementById('r-stars').textContent = pct===1?'⭐⭐⭐':pct>=.7?'⭐⭐':'⭐';
  document.getElementById('r-sub').textContent = sub;

  const ws = document.getElementById('wrong-summary');
  const rw = document.getElementById('r-retry-wrong');
  if (allWrongWords.length) {
    ws.style.display = '';
    document.getElementById('wrong-list').innerHTML = allWrongWords.map(w=>`<div class="wrong-chip">${w}</div>`).join('');
    rw.style.display = '';
  } else { ws.style.display='none'; rw.style.display='none'; }

  if (pct >= .7) confetti();
}

function retryWrong() {
  isRepeat = true;
  queue = shuffle(allWrongWords.map(w => {
    for (const t of TOPICS) { const f=t.words.find(x=>x.w===w); if(f) return {...f,topicId:t.id}; }
    return null;
  }).filter(Boolean));
  repeatQueue=[]; allWrongWords=[]; score=0; qIdx=0; totalFirst=queue.length;
  showScreen('game-screen'); renderQ();
}
function retryAll() { startGame(currentTopicId); }
function goMenu()   { showScreen('menu-screen'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function confetti() {
  const cols=['#667eea','#f472b6','#fbbf24','#34d399','#fb923c','#a78bfa'];
  for(let i=0;i<65;i++){
    const c=document.createElement('div'); c.className='cp';
    c.style.cssText=`left:${Math.random()*100}vw;background:${cols[~~(Math.random()*cols.length)]};animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;transform:rotateZ(${Math.random()*360}deg)`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),4500);
  }
}

buildMenu();
</script>
